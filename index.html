<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAC - Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-2xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-black italic text-emerald-400 mb-6 uppercase">APAC BRASIL</h1>
        
        <div class="space-y-4">
            <input id="origem" type="text" placeholder="Origem: Rua, Número, Cidade" class="w-full p-4 bg-slate-900 rounded-lg border border-slate-700 outline-none text-sm">
            <input id="destino" type="text" placeholder="Destino: Rua, Número, Cidade" class="w-full p-4 bg-slate-900 rounded-lg border border-slate-700 outline-none text-sm">
            
            <div class="grid grid-cols-2 gap-4">
                <input id="kml" type="number" value="2.5" step="0.1" class="p-4 bg-slate-900 rounded-lg border border-slate-700 text-sm">
                <input id="preco" type="number" value="6.15" step="0.01" class="p-4 bg-slate-900 rounded-lg border border-slate-700 text-sm">
            </div>

            <button onclick="fazerCalculo()" id="btnAtivar" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 font-bold rounded-lg uppercase transition">
                Diagnosticar Rota
            </button>
        </div>

        <div id="resultado-painel" class="mt-8 hidden border-t border-slate-700 pt-6">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-900 p-4 rounded-lg border border-emerald-500/30 text-center">
                    <p class="text-[10px] uppercase text-slate-400">Distância</p>
                    <h2 id="exibir-dist" class="text-xl font-bold text-white"></h2>
                </div>
                <div class="bg-red-500/10 p-4 rounded-lg border border-red-500/30 text-center">
                    <p class="text-[10px] uppercase text-red-400">Prejuízo R$</p>
                    <h2 id="exibir-prejuizo" class="text-xl font-bold text-red-500"></h2>
                </div>
            </div>
            <div id="mapa-v" class="w-full h-64 rounded-lg bg-slate-900 border border-slate-700"></div>
        </div>
    </div>

    <script>
        let mapaObj = null;

        async function fazerCalculo() {
            const btn = document.getElementById('btnAtivar');
            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;
            const kml = document.getElementById('kml').value;
            const preco = document.getElementById('preco').value;

            if (!origem || !destino) {
                alert("Preencha os endereços!");
                return;
            }

            btn.innerText = "CALCULANDO...";
            btn.disabled = true;

            try {
                const res = await fetch('/calcular-real', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        origem: origem,
                        destino: destino,
                        consumo_kml: parseFloat(kml)
                    })
                });

                if (!res.ok) throw new Error("Erro no servidor");

                const data = await res.json();

                // Mostra os resultados
                document.getElementById('resultado-painel').classList.remove('hidden');
                document.getElementById('exibir-dist').innerText = data.distancia + " KM";
                
                const perda = (data.resultado.total_L - data.resultado.ideal_L) * parseFloat(preco);
                document.getElementById('exibir-prejuizo').innerText = "R$ " + perda.toFixed(2);

                // Mapa
                if (mapaObj) mapaObj.remove();
                mapaObj = L.map('mapa-v').setView([data.diagnostico_infra.lat_o, data.diagnostico_infra.lon_o], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapaObj);
                L.marker([data.diagnostico_infra.lat_o, data.diagnostico_infra.lon_o]).addTo(mapaObj);
                L.marker([data.diagnostico_infra.lat_d, data.diagnostico_infra.lon_d]).addTo(mapaObj);

                const bounds = L.latLngBounds([data.diagnostico_infra.lat_o, data.diagnostico_infra.lon_o], [data.diagnostico_infra.lat_d, data.diagnostico_infra.lon_d]);
                mapaObj.fitBounds(bounds);

            } catch (err) {
                alert("Erro: " + err.message);
            } finally {
                btn.innerText = "Diagnosticar Rota";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
